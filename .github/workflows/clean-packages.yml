name: Clean old GHCR thinkphp images

on:
  schedule:
    - cron: '0 3 * * *'        # 每天 UTC 3:00 运行（北京时间早上 11:00）
  workflow_dispatch:           # 允许手动触发测试

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Keep only latest 3 versions of thinkphp
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # 先用 GITHUB_TOKEN 测试

        run: |
          echo "=== 开始清理 GHCR 镜像: thinkphp ==="

          PACKAGE_NAME="thinkphp"

          # 获取所有版本 ID（按创建时间倒序，最新的在最前面）
          echo "正在获取版本列表..."
          VERSION_IDS=$(gh api \
            "/user/packages/container/${PACKAGE_NAME}/versions" \
            --jq '.[].id')

          if [ -z "$VERSION_IDS" ]; then
            echo "未找到任何版本，或权限不足。请检查 Token。"
            exit 0
          fi

          # 计算要保留的数量
          TOTAL=$(echo "$VERSION_IDS" | wc -l)
          echo "当前总版本数: $TOTAL"

          if [ "$TOTAL" -le 3 ]; then
            echo "版本数 ≤ 3，无需清理。"
            exit 0
          fi

          # 保留最新的 3 个，删除其余（从第 4 行开始）
          DELETE_IDS=$(echo "$VERSION_IDS" | tail -n +4)

          echo "将删除以下版本 ID："
          echo "$DELETE_IDS"

          # 执行删除
          for id in $DELETE_IDS; do
            echo "正在删除版本 ID: $id ..."
            if gh api --method DELETE "/user/packages/container/${PACKAGE_NAME}/versions/$id"; then
              echo "✅ 删除成功: $id"
            else
              echo "⚠️ 删除失败: $id （可能已被删除或有保护）"
            fi
          done

          echo "🎉 清理完成！当前应保留最新 3 个版本。"