name: Build and Deploy to GHCR

on:
  push:
    branches:  [ main, master ]
      paths:                      # 只有这些文件变化才触发构建（优化触发）
      - 'src/**'
      - 'docker/**'
  workflow_dispatch:            # 允许手动触发

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write  
      packages: write  

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha              # 从 GitHub Cache 加载缓存
          cache-to: type=gha,mode=max       # 导出缓存到 GitHub Cache（mode=max 包含所有阶段的缓存）
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
          platforms: linux/amd64  

      - name: Update Kubernetes YAML
        run: |
          # 提取当前 Commit SHA
          IMAGE_TAG=${{ github.sha }}
          sed -i "s|image: ghcr.io/${{ github.repository }}:.*|image: ghcr.io/${{ github.repository }}:${{ github.sha }}|g" k8s/deploy.yaml
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add k8s/deploy.yaml
          git commit -m "chore: update image tag to ${{ github.sha }} [skip ci]"
          git push
