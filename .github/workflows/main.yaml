name: Build and Deploy to GHCR

on:
  push:
    branches:
      - main  # 监听的分支

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 用于更新 k8s/deploy.yaml 并 Push 回仓库
      packages: write   # 必须！用于上传镜像到 GitHub Packages
      id-token: write   # 如果使用了某些身份验证插件可能需要

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          # 使用 Commit SHA 作为唯一 Tag 避免镜像覆盖
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # 关键：自动更新 K8s 配置文件中的镜像 Tag 并回写仓库
      - name: Update Kubernetes YAML
        run: |
          # 1. 执行替换（确保匹配路径与 YAML 中完全一致）
          sed -i "s|image: ghcr.io/${{ github.repository_owner }}/thinkphp:.*|image: ghcr.io/${{ github.repository_owner }}/thinkphp:${{ github.sha }}|g" k8s/deploy.yaml
          
          # 2. 检查是否有文件变更
          if git diff --exit-code k8s/deploy.yaml; then
            echo "No changes to commit"
            exit 0
          fi

          # 3. 如果有变更，执行提交
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add k8s/deploy.yaml
          git commit -m "chore: update image tag to ${{ github.sha }} [skip ci]"
          git push