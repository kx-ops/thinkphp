name: Build and Deploy to GHCR

on:
  push:
    branches:
      - main  # 监听的分支

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          # 使用 Commit SHA 作为唯一 Tag 避免镜像覆盖
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # 关键：自动更新 K8s 配置文件中的镜像 Tag 并回写仓库
      - name: Update Kubernetes YAML
        run: |
          sed -i "s|image: ghcr.io/${{ github.repository }}:.*|image: ghcr.io/${{ github.repository }}:${{ github.sha }}|g" k8s/deploy.yaml
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add k8s/deploy.yaml
          git commit -m "chore: update image tag to ${{ github.sha }} [skip ci]"
          git push