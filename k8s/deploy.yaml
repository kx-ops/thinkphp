apiVersion: apps/v1
kind: Deployment
metadata:
  name: php-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: php-app
  template:
    metadata:
      labels:
        app: php-app
    spec:
      containers:
      - name: php-nginx
        image: ghcr.io/kx-ops/thinkphp:38782253dec251547cee51411b3649a0a988102b
        ports:
        - containerPort: 80
      imagePullSecrets:
      - name: ghcr-login-secret 