apiVersion: apps/v1
kind: Deployment
metadata:
  name: php-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: php-app
  template:
    metadata:
      labels:
        app: php-app
    spec:
      containers:
      - name: php-nginx
        image: ghcr.io/kx-ops/thinkphp:ebc2f577f7df5b99a1285a31d9b1807c50feb3e8
        ports:
        - containerPort: 80
      imagePullSecrets:
      - name: ghcr-login-secret 