apiVersion: apps/v1
kind: Deployment
metadata:
  name: php-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: php-app
  template:
    metadata:
      labels:
        app: php-app
    spec:
      containers:
      - name: php-nginx
        image: ghcr.io/kx-ops/thinkphp:3f80cbebb74c725c622bc8f1d11dd7cd740ea978
        ports:
        - containerPort: 80
      imagePullSecrets:
      - name: ghcr-login-secret 