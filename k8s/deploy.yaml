apiVersion: apps/v1
kind: Deployment
metadata:
  name: php-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: php-app
  template:
    metadata:
      labels:
        app: php-app
    spec:
      containers:
      - name: php-nginx
        image: ghcr.io/kx-ops/thinkphp:2d47e8a0ccd8a0a22c0e9e8b8623324fe9650efa
        ports:
        - containerPort: 80
      imagePullSecrets:
      - name: ghcr-login-secret # 必须配置，否则无法从 GitHub Packages 拉取镜像