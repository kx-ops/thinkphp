apiVersion: apps/v1
kind: Deployment
metadata:
  name: php-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: php-app
  template:
    metadata:
      labels:
        app: php-app
    spec:
      containers:
      - name: php-nginx
        image: ghcr.io/kx-ops/thinkphp:75cb5ec74f2b68ded4bac89cb9eecf2685e69137
        ports:
        - containerPort: 80
      imagePullSecrets:
      - name: ghcr-login-secret 