apiVersion: apps/v1
kind: Deployment
metadata:
  name: php-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: php-app
  template:
    metadata:
      labels:
        app: php-app
    spec:
      containers:
      - name: php-nginx
        image: ghcr.io/kx-ops/thinkphp:526d910d46005db99e60c543ed2acecbc240c98c
        ports:
        - containerPort: 80
      imagePullSecrets:
      - name: ghcr-login-secret 