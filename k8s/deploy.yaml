apiVersion: apps/v1
kind: Deployment
metadata:
  name: php-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: php-app
  template:
    metadata:
      labels:
        app: php-app
    spec:
      containers:
      - name: php-nginx
        image: ghcr.io/kx-ops/thinkphp:bcfb15624ea69cce7ec14316a72c49bbb837f5f8
        ports:
        - containerPort: 80
      imagePullSecrets:
      - name: ghcr-login-secret 