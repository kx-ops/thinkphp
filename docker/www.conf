[www]
user = www-data
group = www-data
listen = 127.0.0.1:9000

; 80核机器建议使用 static 模式，避免频繁创建/销毁进程的开销
pm = static

; 根据 128GB 内存计算：假设每个 PHP 进程占用 60MB
; 80核机器建议设置 200-500 个子进程
pm.max_children = 300

; 每个进程处理 1000 个请求后自动重启，防止内存泄漏
pm.max_requests = 1000

; 确保环境变量能被 PHP 读取（如 Redis 地址）
clear_env = no

; 捕获 worker 进程的标准输出，方便 kubectl logs 查看 PHP 错误
catch_workers_output = yes
decorate_workers_output = no